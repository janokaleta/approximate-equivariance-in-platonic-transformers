# QM9 Molecular Property Regression Configuration

seed: 42

# Dataset configuration
dataset:
  name: "qm9"
  data_dir: "./data/qm9"
  target: "mu"  # Options: mu, alpha, homo, lumo, gap, r2, zpve, U0, U, H, G, Cv, U0_atom, U_atom, H_atom, G_atom, A, B, C
  num_splits: [100000, 18000, 13831]  # train, val, test — Gilmer et al. (2017) split as per paper
  use_k_hot_encoding: true  # Use k-hot embedding for atoms

# Model architecture
model:
  name: "platoformer"
  hidden_dim: 1152
  num_layers: 14
  num_heads: 72
  solid_name: "octahedron"  # Options: tetrahedron, trivial_3, octahedron, icosahedron
  spatial_dim: 3
  dense_mode: false
  
  # Task configuration
  scalar_task_level: "graph"
  vector_task_level: "graph"
  ffn_readout: true
  
  # Attention settings
  mean_aggregation: false
  attention: true
  dropout: 0.0
  drop_path_rate: 0.0
  layer_scale_init_value: null
  ffn_dim_factor: 4
  
  # Positional encoding
  rope_sigma: 0.5  # Paper Table 7: 0.5 for QM9 (was 4.0, which deviates from reported results)
  ape_sigma: 0.5
  learned_freqs: true
  freq_init: "spiral"  # Options: "random", "spiral"
  use_key: false

  # Relaxed group convolution at the PlatonicLinear seam. Disabled preserves the
  # exact equivariant baseline and adds no relaxed parameters.
  relaxed_group_convolution:
    enabled: false
    num_extra_kernels: 0
    scale: 1.0
    kernel_init: "normal"   # Options: "normal", "zeros"
    kernel_init_std: null   # null uses the PlatonicLinear fan-in std
    mixing_init: "zeros"    # Options: "zeros", "normal"; zeros starts from baseline
    mixing_init_std: 1.0e-3
    mixing_l1: 0.0
    mixing_l2: 0.0
    kernel_l2: 0.0

  # Progressive constraint relaxation. Enabled runs train with non-equivariant
  # residual paths and anneals their scale to 0 for strict final evaluation.
  constraint_relaxation:
    enabled: false
    max_scale: 1.0
    schedule: "cosine"  # Options: "constant", "linear", "cosine"
    start_epoch: 0
    end_epoch: null     # null means final training epoch
    apply_to: "both"    # Options: "both", "interaction", "ffn", "none"

# Training configuration
training:
  epochs: 1000
  batch_size: 96
  gradient_clip_val: 0.5
  train_augm: true  # Rotation augmentation

# Optimizer configuration
optimizer:
  name: "adamw"
  lr: 5.0e-4
  weight_decay: 1.0e-8

# Scheduler configuration
scheduler:
  name: "cosine"
  warmup_epochs: 10
  use_cosine: true

# Logging configuration
logging:
  enabled: true
  project_name: "Platonic-QM9-Regr"
  wandb_identity: null
  log_every_n_steps: 50

# System configuration
system:
  gpus: 1
  num_workers: 0
  enable_progress_bar: true
  timer: null  # e.g., "00:08:00:00" for SLURM time limit
  precision: "32"  # Options: "16-mixed", "bf16-mixed", "32"

# Testing/checkpointing
testing:
  test_ckpt: null
  resume_ckpt: null

# Callbacks
callbacks:
  early_stopping:
    enabled: true
    monitor: "val MAE"
    patience: 3
    threshold: 0.8
    grace_epochs: 10

# Checkpoint configuration
checkpoint:
  monitor: "valid MAE"
  mode: "min"
  save_last: true
