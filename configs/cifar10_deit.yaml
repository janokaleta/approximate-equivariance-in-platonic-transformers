# CIFAR-10 Classification with DeiT-III inspired settings
seed: 42
# Dataset configuration
dataset:
  name: "cifar10"
  data_dir: "./data/cifar10"
  num_classes: 10
  image_size: 32
  patch_size: 4
  train_val_split: 0.9  # 90% train, 10% validation from training set

# Model architecture
model:
  name: "platoformer"
  hidden_dim: 768
  num_layers: 12
  num_heads: 12
  solid_name: "cyclic_4"  # Symmetry group (trivial_2, cyclic_#, dihedral_#, flop)
  spatial_dim: 2  # CIFAR-10 treated as 2D point cloud
  dense_mode: true
  
  # Task configuration
  scalar_task_level: "graph"  # Graph-level classification
  vector_task_level: "graph"
  ffn_readout: false
  
  # Attention settings
  mean_aggregation: false
  attention: true
  dropout: 0.0
  drop_path_rate: 0.1  # Stochastic depth
  layer_scale_init_value: null  # Set to float to enable LayerScale
  ffn_dim_factor: 4
  
  # Positional encoding (RoPE and APE)
  rope_sigma: 16.0
  ape_sigma: 16.0
  learned_freqs: true
  freq_init: "spiral"  # Options: "random", "spiral"
  use_key: false

  # Relaxed group convolution at the PlatonicLinear seam. Disabled preserves the
  # exact equivariant baseline and adds no relaxed parameters.
  relaxed_group_convolution:
    enabled: false
    num_extra_kernels: 0
    scale: 1.0
    kernel_init: "normal"   # Options: "normal", "zeros"
    kernel_init_std: null   # null uses the PlatonicLinear fan-in std
    mixing_init: "zeros"    # Options: "zeros", "normal"; zeros starts from baseline
    mixing_init_std: 1.0e-3
    mixing_l1: 0.0
    mixing_l2: 0.0
    kernel_l2: 0.0

  # Progressive constraint relaxation. Enabled runs train with non-equivariant
  # residual paths and anneals their scale to 0 for strict final evaluation.
  constraint_relaxation:
    enabled: false
    max_scale: 1.0
    schedule: "cosine"  # Options: "constant", "linear", "cosine"
    start_epoch: 0
    end_epoch: null     # null means final training epoch
    apply_to: "both"    # Options: "both", "interaction", "ffn", "none"

# Training configuration (overrides defaults)
training:
  epochs: 500
  batch_size: 256
  loss_fn: "bce"  # Options: "cross_entropy", "bce"
  gradient_clip_val: 0.5
  
  # Data augmentation
  train_augm: false  # Rotation augmentation on point cloud
  use_deit3_augmentation: true  # 3-Augment + Color Jitter

# Optimizer configuration (DeiT-III uses LAMB)
optimizer:
  name: "lamb"  # Options: "adamw", "lamb"
  lr: 8.0e-4
  weight_decay: 0.05

# Scheduler configuration
scheduler:
  name: "cosine"
  warmup_epochs: 20

# Logging configuration
logging:
  enabled: true
  project_name: "Platonic-CIFAR10"

# System configuration
system:
  gpus: 1
  num_workers: 4
  enable_progress_bar: true

# Testing configuration
testing:
  test_ckpt: null  # Path to checkpoint for testing only
  resume_ckpt: null  # Path to checkpoint to resume training

# Checkpoint configuration
checkpoint:
  monitor: "valid_acc"
  mode: "max"
  save_last: true
